<aside class="logo">

	{% if page.url == '/index.html' or page.url == '/' %}
		{% assign link = '/about' %}
		{% assign prompt = 'About the Author' %}
	{% else %}
		{% assign link = '/' %}
		{% assign prompt = 'Back to Home' %}
	{% endif %}

	<a href="{{ link | prepend: site.baseurl }}">
		<img src="https://avatars1.githubusercontent.com/u/13747699?v=3&u=b5e7b5f5d53dc649de93e4fbf4233f241145fc0b&s=400" class="gravatar">
	</a>
	<span class="logo-prompt">{{ prompt }}</span>

</aside>
